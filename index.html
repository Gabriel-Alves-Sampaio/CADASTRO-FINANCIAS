<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Controle de Finanças - ADS</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-light">
    <div class="container mt-5">
        <div class="card p-4 shadow-sm">
            <h2 class="mb-4">Registro de Gastos</h2>
            <div class="row g-3">
                <div class="col-md-4">
                    <label for="descricao">Descrição do Gasto</label>
                    <input type="text" id="descricao" class="form-control" placeholder="Ex: Almoço">
                </div>
                <div class="col-md-3">
                    <label for="valor">Valor (R$)</label>
                    <input type="number" id="valor" class="form-control" placeholder="0.00">
                </div>
                <div class="col-md-3">
                    <label for="categoria">Categoria</label>
                    <input type="text" id="categoria" class="form-control" placeholder="Ex: Alimentação">
                </div>
                <div class="col-md-2 d-flex align-items-end">
                    <button class="btn btn-primary w-100 botao-animado" type="button" onclick="salvarGasto()">Salvar</button>
                </div>
            </div>
        </div>

        <div class="mt-4">
            <div class="alert alert-info d-flex justify-content-between">
                <h4 class="mb-0">Total Acumulado:</h4>
                <h4 class="mb-0" id="exibirTotal">R$ 0,00</h4>
            </div>
            
            <table class="table table-striped bg-white shadow-sm" id="tabela">
                <tr>
                    <th>Descrição</th>
                    <th>Categoria</th>
                    <th>Valor</th>
                    <th>Ações</th>
                </tr>
            </table>
        </div>
    </div>
   
    <script src="main.js"></script>
</body>
</html>
