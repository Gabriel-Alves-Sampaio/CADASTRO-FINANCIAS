<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Controle de Finanças - ADS</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-light">
    <main class="container mt-5">
        <section class="card p-4 shadow-sm">
            <header>
                <h2 class="mb-4">Registro de Gastos</h2>
            </header>
            
            <form id="formularioGasto" class="row g-3">
                <div class="col-md-4">
                    <label for="descricao">Descrição do Gasto</label>
                    <input type="text" id="descricao" class="form-control" placeholder="Ex: Almoço" required>
                </div>
                <div class="col-md-3">
                    <label for="valor">Valor (R$)</label>
                    <input type="number" id="valor" class="form-control" placeholder="0.00" required step="0.01">
                </div>
                <div class="col-md-3">
                    <label for="categoria">Categoria</label>
                    <input type="text" id="categoria" class="form-control" placeholder="Ex: Alimentação" required>
                </div>
                <div class="col-md-2 d-flex align-items-end">
                    <button class="btn btn-primary w-100 botao-animado" type="button" onclick="salvarGasto()">Salvar</button>
                </div>
            </form>
        </section>

        <section class="mt-4">
            <article class="alert alert-info d-flex justify-content-between align-items-center">
                <h4 class="mb-0">Total Acumulado:</h4>
                <output class="h4 mb-0" id="exibirTotal">R$ 0,00</output>
            </article>
            
            <div class="table-responsive">
                <table class="table table-striped bg-white shadow-sm" id="tabela">
                    <thead class="table-dark">
                        <tr>
                            <th>Descrição</th>
                            <th>Categoria</th>
                            <th>Valor</th>
                            <th>Ações</th>
                        </tr>
                    </thead>
                    <tbody id="corpoTabela">
                        </tbody>
                </table>
            </div>
        </section>
    </main>
   
    <script src="main.js"></script>
</body>
</html>
